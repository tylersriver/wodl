name: Wodl
options:
  bundleIdPrefix: app.wodl
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Wodl:
    type: application
    platform: iOS
    sources:
      - path: Wodl
        excludes:
          - "**/.DS_Store"
    info:
      path: Wodl/Info.plist
      properties:
        CFBundleDisplayName: WODL
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        INFOPLIST_FILE: Wodl/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.wodl.ios
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    entitlements:
      path: Wodl/Wodl.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)app.wodl.ios
