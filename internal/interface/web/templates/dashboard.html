{{define "dashboard.html"}}
{{template "head" .}}
<div class="flex flex-col items-center justify-center min-h-[60vh] space-y-6">
    <div class="flex gap-3">
        <label for="create-lift-modal" class="btn btn-primary btn-sm">+ Lift</label>
        <label for="create-workout-modal" class="btn btn-secondary btn-sm">+ Workout</label>
        <a href="/sessions" class="btn btn-accent btn-sm">+ Session</a>
    </div>
    <h1 class="text-4xl font-bold">WODL</h1>
    <p class="text-base-content/60">Search your lifts, workouts, and sessions</p>
    <div class="w-full max-w-lg">
        <input type="text" name="q" placeholder="Search lifts, workouts & sessions..."
            class="input input-bordered input-lg w-full"
            hx-get="/api/search"
            hx-trigger="input changed delay:200ms, search"
            hx-target="#search-results"
            hx-params="*"
            autocomplete="off" />
    </div>
    <div id="search-results" class="w-full max-w-lg"></div>
</div>

<input type="checkbox" id="create-lift-modal" class="modal-toggle" />
<div class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg">Add New Lift</h3>
        <form method="POST" action="/lifts" class="space-y-4 mt-4">
            <div class="form-control">
                <label class="label"><span class="label-text">Name</span></label>
                <input type="text" name="name" class="input input-bordered" placeholder="e.g. Back Squat" required />
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text">Category</span></label>
                <select name="category" class="select select-bordered">
                    {{range .Categories}}
                    <option value="{{.}}">{{.}}</option>
                    {{end}}
                </select>
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text">Known 1RM (optional)</span></label>
                <input type="number" name="one_rep_max" class="input input-bordered" step="0.5" min="0" />
            </div>
            <div class="modal-action">
                <label for="create-lift-modal" class="btn">Cancel</label>
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </form>
    </div>
    <label class="modal-backdrop" for="create-lift-modal"></label>
</div>

<input type="checkbox" id="create-workout-modal" class="modal-toggle" />
<div class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg">Add New Workout</h3>
        <form method="POST" action="/workouts" class="space-y-4 mt-4">
            <div class="form-control">
                <label class="label"><span class="label-text">Name</span></label>
                <input type="text" name="name" class="input input-bordered" placeholder="e.g. Fran" required />
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text">Type</span></label>
                <select name="type" class="select select-bordered">
                    {{range .WorkoutTypes}}
                    <option value="{{.}}">{{.}}</option>
                    {{end}}
                </select>
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text">Description</span></label>
                <textarea name="description" class="textarea textarea-bordered" rows="4"
                    placeholder="21-15-9&#10;Thrusters (95/65)&#10;Pull-ups"></textarea>
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="form-control">
                    <label class="label"><span class="label-text">Time Cap (sec)</span></label>
                    <input type="number" name="time_cap" class="input input-bordered input-sm" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">Rounds</span></label>
                    <input type="number" name="rounds" class="input input-bordered input-sm" />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">Interval (sec)</span></label>
                    <input type="number" name="interval_seconds" class="input input-bordered input-sm" />
                </div>
            </div>
            <div class="modal-action">
                <label for="create-workout-modal" class="btn">Cancel</label>
                <button type="submit" class="btn btn-secondary">Create</button>
            </div>
        </form>
    </div>
    <label class="modal-backdrop" for="create-workout-modal"></label>
</div>
{{template "tail" .}}
{{end}}
